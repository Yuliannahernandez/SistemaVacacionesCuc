<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Historial por Departamento – CUC</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#f4f1eb;--card:#fff;--accent:#2d6a4f;--accent2:#52b788;
    --warn:#e76f51;--text:#1b1b1b;--muted:#6b7280;--border:#e5e0d8;--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  nav{background:var(--accent);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;}
  nav .brand{font-family:'DM Serif Display',serif;font-size:1.4rem;color:#fff;}
  nav .user-info{color:#b7e4c7;font-size:.85rem;}
  nav a.back{color:#b7e4c7;text-decoration:none;font-size:.85rem;border:1px solid #52b78860;padding:6px 14px;border-radius:8px;}
  nav a.back:hover{background:#52b78830;}

  .hero{background:linear-gradient(135deg,var(--accent),#1b4332);padding:40px 32px 56px;text-align:center;color:#fff;}
  .hero h1{font-family:'DM Serif Display',serif;font-size:2.2rem;margin-bottom:6px;}
  .hero p{color:#b7e4c7;}

  .container{max-width:1100px;margin:-32px auto 48px;padding:0 24px;}

  /* RESUMEN DEPTO */
  .depto-card{background:var(--card);border-radius:var(--radius);padding:24px 28px;margin-bottom:24px;border:1px solid var(--border);box-shadow:0 2px 12px #0001;}
  .depto-card h2{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:4px;}
  .depto-card p{color:var(--muted);font-size:.88rem;}

  /* FILTRO */
  .filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .filters select, .filters input{
    background:#fff;border:1px solid var(--border);border-radius:10px;
    padding:9px 14px;font-size:.88rem;font-family:'DM Sans',sans-serif;color:var(--text);
  }
  .btn-filter{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 20px;font-size:.88rem;cursor:pointer;}

  /* TABLA */
  .table-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:0 2px 12px #0001;}
  table{width:100%;border-collapse:collapse;}
  th{background:#f9f7f4;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;padding:14px 16px;text-align:left;border-bottom:1px solid var(--border);}
  td{padding:14px 16px;font-size:.88rem;border-bottom:1px solid #f0ede8;vertical-align:middle;}
  tr:last-child td{border:none;}
  tr:hover td{background:#fafaf8;}

  .badge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:.75rem;font-weight:700;}
  .badge.aprobada{background:#d1fae5;color:#065f46;}
  .badge.pendiente{background:#fef9c3;color:#854d0e;}
  .badge.rechazada{background:#fee2e2;color:#991b1b;}
  .badge.cancelada{background:#f3f4f6;color:#6b7280;}

  .dias-bar{width:80px;height:8px;background:#e5e0d8;border-radius:99px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px;}
  .dias-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;}

  .loading{text-align:center;padding:40px;color:var(--muted);}
  .empty{text-align:center;padding:40px;color:var(--muted);font-size:.9rem;}

  /* PAGINACIÓN */
  .pagination{display:flex;gap:8px;justify-content:center;margin-top:20px;}
  .page-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.85rem;cursor:pointer;}
  .page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
</style>
</head>
<body>

<nav>
  <span class="brand">Sistema Vacaciones CUC</span>
  <span class="user-info" id="nav-user">Cargando…</span>
  <a class="back" href="../dashboard.html">← Dashboard</a>
</nav>

<div class="hero">
  <h1>Historial por Departamento</h1>
  <p>Visualiza el uso de vacaciones de todos los funcionarios de tu departamento</p>
</div>

<div class="container">
  <div class="depto-card">
    <h2 id="depto-nombre">—</h2>
    <p id="depto-sub">Jefe / Recursos Humanos</p>
  </div>

  <div class="filters">
    <select id="filtro-estado">
      <option value="">Todos los estados</option>
      <option value="pendiente">Pendiente</option>
      <option value="aprobada">Aprobada</option>
      <option value="rechazada">Rechazada</option>
      <option value="cancelada">Cancelada</option>
    </select>
    <input type="text" id="filtro-nombre" placeholder="Buscar funcionario…"/>
    <button class="btn-filter" onclick="aplicarFiltro()">Filtrar</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Funcionario</th>
          <th>Período</th>
          <th>Días solicitados</th>
          <th>Saldo disponible</th>
          <th>Estado</th>
          <th>Fecha solicitud</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="6" class="loading">Cargando historial…</td></tr>
      </tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<script>
const API = 'http://localhost:3000/api';
let allData = [];
const PER_PAGE = 15;
let currentPage = 1;

function getFuncionario() {
  try { return JSON.parse(localStorage.getItem('funcionario')) || null; }
  catch { return null; }
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('es-CR', {day:'2-digit',month:'short',year:'numeric'});
}

function badge(estado) {
  return `<span class="badge ${estado}">${estado.charAt(0).toUpperCase()+estado.slice(1)}</span>`;
}

function renderTabla(data) {
  const tbody = document.getElementById('table-body');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No se encontraron registros.</td></tr>';
    return;
  }

  const start = (currentPage - 1) * PER_PAGE;
  const page = data.slice(start, start + PER_PAGE);

  tbody.innerHTML = page.map(r => {
    const pct = r.dias_acumulados > 0
      ? Math.min(100, Math.round(((r.dias_acumulados - r.dias_disponibles) / r.dias_acumulados) * 100))
      : 0;
    return `<tr>
      <td><strong>${r.nombre_completo || r.funcionario || '—'}</strong></td>
      <td>${r.fecha_inicio ? fmtDate(r.fecha_inicio)+' → '+fmtDate(r.fecha_fin) : '—'}</td>
      <td>${r.dias_solicitados != null ? r.dias_solicitados+' días' : '—'}</td>
      <td>
        <span class="dias-bar"><span class="dias-bar-fill" style="width:${pct}%"></span></span>
        ${r.dias_disponibles != null ? r.dias_disponibles+' días' : '—'}
      </td>
      <td>${r.estado ? badge(r.estado) : '—'}</td>
      <td>${fmtDate(r.fecha_solicitud)}</td>
    </tr>`;
  }).join('');

  renderPaginacion(data.length);
}

function renderPaginacion(total) {
  const pages = Math.ceil(total / PER_PAGE);
  const el = document.getElementById('pagination');
  el.innerHTML = Array.from({length: pages}, (_, i) =>
    `<button class="page-btn ${i+1===currentPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`
  ).join('');
}

function goPage(n) {
  currentPage = n;
  aplicarFiltro();
}

function aplicarFiltro() {
  const estado = document.getElementById('filtro-estado').value;
  const nombre = document.getElementById('filtro-nombre').value.toLowerCase();
  const filtrado = allData.filter(r => {
    const matchEstado = !estado || r.estado === estado;
    const nombreStr = (r.nombre_completo || r.funcionario || '').toLowerCase();
    const matchNombre = !nombre || nombreStr.includes(nombre);
    return matchEstado && matchNombre;
  });
  renderTabla(filtrado);
}

async function init() {
  const func = getFuncionario();
  if (!func) { window.location.href = '../autenticacion/login.html'; return; }

  // Verificar acceso
  if (!['Jefe','RRHH','Admin'].includes(func.rol)) {
    document.body.innerHTML = '<div style="text-align:center;padding:80px;font-size:1.1rem;color:#991b1b;">⛔ No tiene permiso para acceder a esta sección.</div>';
    return;
  }

  document.getElementById('nav-user').textContent = `${func.nombre} ${func.apellido1}`;
  document.getElementById('depto-nombre').textContent = func.departamento || `Departamento ${func.id_departamento}`;

  try {
    // Intentar historial por solicitudes del departamento
    const res = await fetch(`${API}/solicitudes/historial?id_departamento=${func.id_departamento}`);
    if (!res.ok) throw new Error('Error al cargar historial');
    allData = await res.json();
    renderTabla(allData);
  } catch (e) {
    document.getElementById('table-body').innerHTML =
      `<tr><td colspan="6" style="color:#991b1b;padding:24px">⚠ ${e.message}</td></tr>`;
  }
}

init();
</script>
</body>
</html>
