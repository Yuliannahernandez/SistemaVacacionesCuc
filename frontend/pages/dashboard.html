<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIGEVAC — Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@200;300;400;500&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --g900: #002D72;
            --g800: #001f52;
            --g700: #00286a;
            --g500: #1a5ba8;
            --g300: #7da6d8;
            --g100: #ccdcf0;
            --g050: #e8f0f9;
            --gold: #b8922a;
            --gold-bg: rgba(185, 150, 60, 0.1);
            --bone: #F8F9FA;
            --text: #333333;
            --muted: rgba(51, 51, 51, 0.45);
            --dim: rgba(51, 51, 51, 0.22);
            --nav-h: 56px;
            --side-w: 350px;
            --radius: 14px;
            --trans: all .2s cubic-bezier(.4, 0, .2, 1);
        }

        [data-theme="dark"] {
            --bone: #0a0f1e;
            --text: #ccdcf0;
            --muted: rgba(180, 200, 230, 0.45);
            --dim: rgba(180, 200, 230, 0.22);
            --g050: rgba(0, 31, 82, 0.3);
            --g100: rgba(0, 31, 82, 0.5);
            --gold: #c8a040;
            --gold-bg: rgba(185, 150, 60, 0.15);
        }

        html,
        body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bone);
            color: var(--text);
            overflow: hidden;
            transition: background .3s, color .3s;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: var(--bone);
            transition: background .3s;
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 50% 40% at 75% 10%, rgba(26, 91, 168, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse 35% 50% at 8% 90%, rgba(0, 40, 106, 0.05) 0%, transparent 55%);
        }

        /* ══ TOPNAV ══ */
        .topnav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-h);
            z-index: 200;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: rgba(0, 45, 114, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: 20px;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 29px;
            height: 29px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--g500), var(--g300));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 13px;
            height: 13px;
            stroke: #fff;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
        }

        .logo-text strong {
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            font-weight: 400;
            color: rgba(204, 220, 240, 0.9);
            letter-spacing: .1em;
            display: block;
            line-height: 1;
        }

        .logo-text small {
            font-size: 8px;
            font-weight: 300;
            color: rgba(125, 166, 216, 0.3);
            letter-spacing: .18em;
            text-transform: uppercase;
        }

        .nav-vdiv {
            width: 1px;
            height: 18px;
            background: rgba(255, 255, 255, 0.07);
            margin-right: 16px;
            flex-shrink: 0;
        }

        .nav-sep {
            width: 1px;
            height: 14px;
            background: rgba(255, 255, 255, 0.07);
            margin: 0 4px;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1px;
            flex: 1;
            position: relative;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 12px;
            border-radius: 9px;
            font-size: 11.5px;
            font-weight: 300;
            color: rgba(204, 220, 240, 0.4);
            text-decoration: none;
            cursor: pointer;
            transition: var(--trans);
            white-space: nowrap;
            position: relative;
            flex-shrink: 0;
        }

        .nav-link svg {
            width: 13px;
            height: 13px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            flex-shrink: 0;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(204, 220, 240, 0.7);
        }

        .nav-link.active {
            background: rgba(125, 166, 216, 0.11);
            color: var(--g300);
            border: 1px solid rgba(125, 166, 216, 0.13);
        }

        .nav-link.active::after {
            content: '';
            position: absolute;
            left: 22%;
            right: 22%;
            bottom: 0;
            height: 2px;
            border-radius: 2px 2px 0 0;
            background: var(--g300);
        }

        .nav-group {
            position: relative;
            flex-shrink: 0;
        }

        .nav-group-btn {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 11px;
            border-radius: 9px;
            font-size: 11.5px;
            font-weight: 300;
            color: rgba(204, 220, 240, 0.4);
            cursor: pointer;
            transition: var(--trans);
            white-space: nowrap;
            user-select: none;
        }

        .nav-group-btn svg {
            width: 13px;
            height: 13px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            flex-shrink: 0;
        }

        .nav-chevron {
            margin-left: 2px;
            transition: transform .2s;
            opacity: .5;
        }

        .nav-group-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(204, 220, 240, 0.7);
        }

        .nav-group.open .nav-group-btn {
            background: rgba(125, 166, 216, 0.11);
            color: var(--g300);
        }

        .nav-group.open .nav-chevron {
            transform: rotate(180deg);
        }

        .nav-submenu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            min-width: 200px;
            background: rgba(0, 31, 82, 0.97);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(125, 166, 216, 0.1);
            border-radius: 12px;
            padding: 6px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
            z-index: 300;
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
            transition: opacity .18s, transform .18s;
        }

        .nav-group.open .nav-submenu {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .nav-sub-item {
            display: block;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11.5px;
            font-weight: 300;
            color: rgba(204, 220, 240, 0.5);
            text-decoration: none;
            cursor: pointer;
            transition: var(--trans);
            white-space: nowrap;
        }

        .nav-sub-item:hover {
            background: rgba(125, 166, 216, 0.1);
            color: rgba(204, 220, 240, 0.85);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-left: auto;
            flex-shrink: 0;
        }

        .nav-date {
            font-size: 9.5px;
            font-weight: 300;
            color: rgba(125, 166, 216, 0.3);
            font-family: 'DM Mono', monospace;
            margin-right: 6px;
            white-space: nowrap;
        }

        .nav-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--trans);
            position: relative;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.09);
        }

        .nav-btn svg {
            width: 13px;
            height: 13px;
            stroke: rgba(125, 166, 216, 0.5);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
        }

        .notif-dot {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #E4002B;
            border: 1.5px solid #002D72;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 300;
            color: rgba(125, 166, 216, 0.38);
            transition: var(--trans);
            white-space: nowrap;
        }

        .action-btn svg {
            width: 12px;
            height: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
            flex-shrink: 0;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(204, 220, 240, 0.62);
        }

        .action-btn.logout:hover {
            color: rgba(228, 0, 43, 0.7);
        }

        .user-wrap {
            position: relative;
            margin-left: 3px;
        }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px 4px 5px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            cursor: pointer;
            transition: var(--trans);
        }

        .user-pill:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .user-wrap.open .user-pill {
            background: rgba(125, 166, 216, 0.1);
            border-color: rgba(125, 166, 216, 0.15);
        }

        .avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #001f52, #1a5ba8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9.5px;
            font-weight: 500;
            color: #fff;
            flex-shrink: 0;
        }

        .user-pill-text {
            display: flex;
            flex-direction: column;
        }

        .user-pill-name {
            font-size: 11px;
            font-weight: 300;
            color: rgba(204, 220, 240, 0.62);
            line-height: 1.1;
        }

        .user-pill-nom {
            font-size: 8.5px;
            font-weight: 300;
            color: rgba(125, 166, 216, 0.35);
            letter-spacing: .04em;
        }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 7px);
            right: 0;
            width: 210px;
            background: rgba(0, 31, 82, 0.97);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(125, 166, 216, 0.1);
            border-radius: 14px;
            padding: 12px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
            z-index: 300;
            opacity: 0;
            transform: translateY(-6px);
            pointer-events: none;
            transition: opacity .18s, transform .18s;
        }

        .user-wrap.open .user-dropdown {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .ud-label {
            font-size: 8px;
            font-weight: 400;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: rgba(125, 166, 216, 0.3);
            margin-bottom: 8px;
            padding: 0 4px;
        }

        .ud-pill {
            display: flex;
            flex-direction: column;
            padding: 8px 10px;
            border-radius: 9px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--trans);
            margin-bottom: 4px;
        }

        .ud-pill:last-child {
            margin-bottom: 0;
        }

        .ud-pill:hover {
            background: rgba(125, 166, 216, 0.08);
        }

        .ud-pill.active {
            background: rgba(26, 91, 168, 0.15);
            border-color: rgba(125, 166, 216, 0.18);
        }

        .ud-pill-name {
            font-size: 11.5px;
            font-weight: 300;
            color: rgba(204, 220, 240, 0.55);
        }

        .ud-pill.active .ud-pill-name {
            color: var(--g300);
        }

        .ud-pill-sub {
            font-size: 9px;
            font-weight: 300;
            color: rgba(125, 166, 216, 0.28);
            margin-top: 1px;
        }

        /* ══ LAYOUT ══ */
        .layout {
            position: relative;
            z-index: 10;
            margin-top: var(--nav-h);
            height: calc(100vh - var(--nav-h));
            display: flex;
        }

        /* ══ MAIN ══ */
        .main {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 24px 22px 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--dim) transparent;
        }

        .greeting {
            margin-bottom: 18px;
            animation: fadeUp .4s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(7px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .greeting h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            color: var(--text);
        }

        .greeting h1 em {
            font-style: italic;
            color: #E4002B;
        }

        [data-theme="dark"] .greeting h1 em {
            color: #E4002B;
        }

        .greeting p {
            font-size: 10.5px;
            font-weight: 300;
            color: var(--muted);
            margin-top: 3px;
            font-family: 'DM Mono', monospace;
        }

        /* ══ CALENDAR ══ */
        .cal-section {
            margin-bottom: 16px;
            animation: fadeUp .4s .06s both;
        }

        .section-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .section-label {
            font-size: 9px;
            font-weight: 400;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .cal-controls {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .cal-month-display {
            font-family: 'DM Serif Display', serif;
            font-size: 14px;
            color: var(--text);
            min-width: 100px;
            text-align: center;
        }

        .cal-legend {
            display: flex;
            gap: 11px;
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            font-weight: 300;
            color: var(--muted);
        }

        .leg-dot {
            width: 6px;
            height: 6px;
            border-radius: 2px;
        }

        .cal-nav {
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: var(--g050);
            border: 1px solid var(--g100);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--trans);
        }

        .cal-nav:hover {
            background: var(--g100);
        }

        .cal-nav svg {
            width: 11px;
            height: 11px;
            stroke: var(--muted);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
        }

        .cal-card {
            background: rgba(255, 255, 255, 0.44);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius);
            padding: 16px 18px;
            box-shadow: 0 2px 18px rgba(0, 0, 0, 0.05);
            transition: background .3s;
        }

        [data-theme="dark"] .cal-card {
            background: rgba(0, 31, 82, 0.18);
            border-color: rgba(125, 166, 216, 0.08);
        }

        .week-hdr {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 3px;
        }

        .wday {
            text-align: center;
            font-size: 8px;
            font-weight: 400;
            color: var(--dim);
            letter-spacing: .06em;
            text-transform: uppercase;
            padding: 3px 0;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
        }

        .day {
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10.5px;
            font-weight: 300;
            color: var(--muted);
            border-radius: 6px;
            cursor: default;
            transition: var(--trans);
            position: relative;
        }

        .day:not(.empty):hover {
            background: var(--g050);
            color: var(--text);
        }

        .day.empty {
            pointer-events: none;
        }

        .day.weekend {
            color: rgba(0, 40, 106, 0.5);
        }

        [data-theme="dark"] .day.weekend {
            color: rgba(125, 166, 216, 0.35);
        }

        .day.today {
            background: var(--g800);
            color: #fff;
            font-weight: 500;
        }

        [data-theme="dark"] .day.today {
            background: var(--g500);
        }

        .day.holiday {
            background: rgba(26, 91, 168, 0.1);
            color: var(--g700);
            font-weight: 500;
            cursor: pointer;
        }

        [data-theme="dark"] .day.holiday {
            background: rgba(26, 91, 168, 0.18);
            color: var(--g300);
        }

        .day.holiday:hover {
            background: rgba(26, 91, 168, 0.18);
        }

        .day.nopay {
            background: var(--gold-bg);
            color: var(--gold);
        }

        .day.nopay:hover {
            background: rgba(185, 150, 60, 0.17);
        }

        .day-dot {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: currentColor;
            opacity: .45;
        }

        .tooltip {
            position: fixed;
            z-index: 9999;
            background: var(--g900);
            border-radius: 9px;
            padding: 8px 13px;
            pointer-events: none;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity .14s, transform .14s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .tooltip.show {
            opacity: 1;
            transform: translateY(0);
        }

        .tooltip strong {
            display: block;
            font-size: 10.5px;
            font-weight: 400;
            color: var(--g300);
            margin-bottom: 2px;
        }

        .tooltip span {
            font-size: 9px;
            font-weight: 300;
            color: rgba(125, 166, 216, 0.5);
        }

        /* ══ CARDS ══ */
        .glass-card {
            background: rgba(255, 255, 255, 0.44);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.05);
            transition: background .3s, box-shadow .2s;
            animation: fadeUp .4s .1s both;
        }

        [data-theme="dark"] .glass-card {
            background: rgba(0, 31, 82, 0.18);
            border-color: rgba(125, 166, 216, 0.08);
        }

        .glass-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .card-label {
            font-size: 9px;
            font-weight: 400;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
            font-family: 'DM Mono', monospace;
        }

        .quick-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 9px;
        }

        .q-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 9px;
            padding: 16px 6px;
            border-radius: 12px;
            background: var(--g050);
            border: 1px solid var(--g100);
            cursor: pointer;
            transition: var(--trans);
            color: var(--muted);
        }

        .q-btn:hover {
            background: var(--g100);
            transform: translateY(-2px);
            box-shadow: 0 5px 14px rgba(26, 91, 168, 0.12);
            color: var(--g700);
        }

        [data-theme="dark"] .q-btn:hover {
            color: var(--g300);
        }

        .q-btn svg {
            width: 17px;
            height: 17px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
        }

        .q-btn span {
            font-size: 9.5px;
            font-weight: 300;
            text-align: center;
            line-height: 1.3;
        }

        /* ══ SIDEBAR ══ */
        .sidebar {
            width: var(--side-w);
            flex-shrink: 0;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 14px 20px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: var(--dim) transparent;
        }

        .side-card {
            background: rgba(255, 255, 255, 0.44);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            transition: background .3s;
        }

        [data-theme="dark"] .side-card {
            background: rgba(0, 31, 82, 0.18);
            border-color: rgba(125, 166, 216, 0.08);
        }

        .side-label {
            font-size: 8.5px;
            font-weight: 400;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 12px;
            font-family: 'DM Mono', monospace;
        }

        .nom-pills {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 14px;
        }

        .nom-pill {
            display: flex;
            flex-direction: column;
            padding: 9px 12px;
            border-radius: 10px;
            background: var(--g050);
            border: 1px solid var(--g100);
            cursor: pointer;
            transition: var(--trans);
        }

        .nom-pill:hover {
            background: var(--g100);
        }

        .nom-pill.active {
            background: rgba(26, 91, 168, 0.12);
            border-color: rgba(26, 91, 168, 0.28);
        }

        [data-theme="dark"] .nom-pill.active {
            background: rgba(26, 91, 168, 0.18);
            border-color: rgba(125, 166, 216, 0.2);
        }

        .nom-pill-name {
            font-size: 11.5px;
            font-weight: 400;
            color: var(--text);
            transition: var(--trans);
        }

        .nom-pill.active .nom-pill-name {
            color: var(--g700);
        }

        [data-theme="dark"] .nom-pill.active .nom-pill-name {
            color: var(--g300);
        }

        .nom-pill-sub {
            font-size: 9px;
            font-weight: 300;
            color: var(--muted);
            margin-top: 1px;
        }

        .balance-main {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin-bottom: 8px;
        }

        .balance-num {
            font-family: 'DM Serif Display', serif;
            font-size: 42px;
            color: var(--text);
            line-height: 1;
        }

        [data-theme="dark"] .balance-num {
            color: var(--g300);
        }

        .balance-unit {
            font-size: 11px;
            font-weight: 300;
            color: var(--muted);
        }

        .balance-bar {
            height: 3px;
            background: var(--g100);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .balance-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--g700), var(--g500));
            transition: width 1.2s cubic-bezier(.16, 1, .3, 1);
        }

        .balance-sub {
            font-size: 9.5px;
            font-weight: 300;
            color: var(--muted);
        }

        .balance-acum {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--g500);
            margin-top: 4px;
        }

        /* ══ Mensaje sin nombramientos (para RRHH / jefe / admin) ══ */
        .no-nom-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 12px;
            text-align: center;
        }

        .no-nom-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--g050);
            border: 1px solid var(--g100);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .no-nom-icon svg {
            width: 16px;
            height: 16px;
            stroke: var(--g300);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
        }

        .no-nom-text {
            font-size: 11px;
            font-weight: 300;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            line-height: 1.6;
        }

        .rol-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 50px;
            background: rgba(26, 91, 168, 0.08);
            border: 1px solid rgba(26, 91, 168, 0.15);
            font-size: 9px;
            font-weight: 400;
            color: var(--g500);
            letter-spacing: .12em;
            text-transform: uppercase;
            font-family: 'DM Mono', monospace;
        }

        /* ══ FERIADOS ══ */
        .h-list {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .h-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.55);
            cursor: default;
            transition: var(--trans);
        }

        [data-theme="dark"] .h-item {
            background: rgba(0, 31, 82, 0.14);
            border-color: rgba(125, 166, 216, 0.07);
        }

        .h-item:hover {
            background: rgba(255, 255, 255, 0.62);
            transform: translateX(2px);
        }

        [data-theme="dark"] .h-item:hover {
            background: rgba(0, 31, 82, 0.28);
        }

        .h-badge {
            min-width: 34px;
            text-align: center;
            background: rgba(26, 91, 168, 0.1);
            border-radius: 8px;
            padding: 4px 5px;
        }

        .h-badge.np {
            background: var(--gold-bg);
        }

        .h-day {
            font-family: 'DM Serif Display', serif;
            font-size: 17px;
            color: var(--g700);
            line-height: 1;
        }

        [data-theme="dark"] .h-day {
            color: var(--g300);
        }

        .h-badge.np .h-day {
            color: var(--gold);
        }

        .h-mon {
            font-size: 7.5px;
            font-weight: 300;
            color: var(--muted);
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .h-name {
            font-size: 10.5px;
            font-weight: 300;
            color: var(--text);
            line-height: 1.3;
        }

        .h-type {
            font-size: 8.5px;
            font-weight: 300;
            color: var(--dim);
            margin-top: 1px;
        }
    </style>
</head>

<body>
    <div class="bg"></div>
    <div class="tooltip" id="tt"><strong id="ttName"></strong><span id="ttType"></span></div>

    <!-- ══ LAYOUT ══ -->
    <div class="layout">
        <main class="main">
            <div class="greeting">
                <h1>Buen día, <em id="greetName">...</em></h1>
                <p id="greetDate"></p>
            </div>

            <div class="cal-section">
                <div class="section-hd">
                    <span class="section-label">Calendario Costa Rica 2026</span>
                    <div class="cal-controls">
                        <div class="cal-legend">
                            <div class="leg">
                                <div class="leg-dot" style="background:var(--g800);border-radius:50%"></div>Hoy
                            </div>
                            <div class="leg">
                                <div class="leg-dot" style="background:rgba(74,140,101,0.55)"></div>Obligatorio
                            </div>
                            <div class="leg">
                                <div class="leg-dot" style="background:rgba(185,150,60,0.55)"></div>No obligatorio
                            </div>
                        </div>
                        <div style="width:1px;height:12px;background:var(--dim);margin:0 5px"></div>
                        <div class="cal-nav" onclick="prevMonth()">
                            <svg viewBox="0 0 24 24">
                                <polyline points="15 18 9 12 15 6" />
                            </svg>
                        </div>
                        <div class="cal-month-display" id="calMonthLabel"></div>
                        <div class="cal-nav" onclick="nextMonth()">
                            <svg viewBox="0 0 24 24">
                                <polyline points="9 18 15 12 9 6" />
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="cal-card">
                    <div class="week-hdr" id="weekHdr"></div>
                    <div class="cal-grid" id="calGrid"></div>
                </div>
            </div>

            <div class="glass-card">
                <div class="card-label">Accesos rápidos</div>
                <div class="quick-grid">
                    <div class="q-btn" onclick="window.location.href='solicitudes/registrar.html'">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                        <span>Nueva solicitud</span>
                    </div>
                    <div class="q-btn" onclick="window.location.href='solicitudes/consultar.html'">
                        <svg viewBox="0 0 24 24">
                            <path d="M9 11l3 3L22 4" />
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                        </svg>
                        <span>Mis solicitudes</span>
                    </div>
                    <div class="q-btn" onclick="window.location.href='solicitudes/historial.html'">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z" />
                        </svg>
                        <span>Historial</span>
                    </div>
                    <div class="q-btn" onclick="window.location.href='reportes/index.html'">
                        <svg viewBox="0 0 24 24">
                            <path d="M18 20V10M12 20V4M6 20v-6" />
                        </svg>
                        <span>Reportes</span>
                    </div>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <!-- Card saldo de vacaciones — contenido dinámico según rol -->
            <div class="side-card" id="saldoCard">
                <div class="side-label">Saldo de vacaciones</div>
                <!-- El contenido se inyecta por JS según el rol -->
            </div>

            <div class="side-card">
                <div class="side-label">Próximos feriados</div>
                <div class="h-list" id="holidayList"></div>
            </div>
        </aside>
    </div>



    <script src="/frontend/components/navbar.js"></script>
<script src="/frontend/js/session.js"></script>
<app-navbar></app-navbar>

<script>
    // ═══════════════════════════════════════════════════════════════
    // CONSTANTES
    // ═══════════════════════════════════════════════════════════════
    const HOLIDAYS = [
        { d: 1,  m: 1,  name: 'Año Nuevo',                pay: true  },
        { d: 2,  m: 4,  name: 'Jueves Santo',              pay: true  },
        { d: 3,  m: 4,  name: 'Viernes Santo',             pay: true  },
        { d: 11, m: 4,  name: 'Juan Santamaría',           pay: true  },
        { d: 1,  m: 5,  name: 'Día del Trabajo',           pay: true  },
        { d: 25, m: 7,  name: 'Anexión de Nicoya',         pay: true  },
        { d: 2,  m: 8,  name: 'Virgen de los Ángeles',     pay: false },
        { d: 15, m: 8,  name: 'Día de la Madre',           pay: true  },
        { d: 31, m: 8,  name: 'Día de la Persona Negra',   pay: false },
        { d: 15, m: 9,  name: 'Independencia',             pay: true  },
        { d: 1,  m: 12, name: 'Abolición del Ejército',    pay: false },
        { d: 25, m: 12, name: 'Navidad',                   pay: true  }
    ];
    const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const WDAYS  = ['Do','Lu','Ma','Mi','Ju','Vi','Sa'];

    // ═══════════════════════════════════════════════════════════════
    // FUNCIONES — se definen TODAS antes de cualquier ejecución
    // ═══════════════════════════════════════════════════════════════

    // ── Balance visual de un pill ─────────────────────────────────
    function updateBalance(pill) {
        const disp = parseFloat(pill.dataset.disp) || 0;
        const acum = parseFloat(pill.dataset.acum) || 0;
        const pct  = acum > 0 ? Math.round((disp / acum) * 100) : 0;

        document.getElementById('balNum').textContent  = disp % 1 === 0 ? disp : disp.toFixed(1);
        document.getElementById('balSub').textContent  = `De ${acum} días acumulados`;
        document.getElementById('balAcum').textContent = `${pct}% disponible`;
        setTimeout(() => {
            document.getElementById('balFill').style.width = Math.min(pct, 100) + '%';
        }, 50);
    }

    // ── Seleccionar nombramiento (pill) ───────────────────────────
    function selectNom(el) {
        document.querySelectorAll('.nom-pill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        updateBalance(el);

        const id  = parseInt(el.dataset.id);
        const noms = JSON.parse(localStorage.getItem('nombramientos') || '[]');
        const nom  = noms.find(n => n.id_nombramiento === id);
        if (nom) {
            localStorage.setItem('tipoNombramiento', JSON.stringify(nom));
            localStorage.setItem('id_nombramiento_activo', id.toString());
        }
    }

   async function cargarSaldosDesdeAPI() {
    const sesionRaw = localStorage.getItem('funcionario');
    console.log('[Dashboard] funcionario raw:', sesionRaw);

    const f  = JSON.parse(sesionRaw || '{}');
    const id = f.id_funcionario || f.id;

    console.log('[Dashboard] id usado para fetch:', id);
    if (!id) {
        console.warn('[Dashboard] Sin id_funcionario, no se puede cargar saldo');
        return;
    }

    try {
        const url = `/api/saldo/disponible/${id}`;
        console.log('[Dashboard] Fetching:', url);

        const res = await fetch(url, { credentials: 'include' });
        console.log('[Dashboard] HTTP status:', res.status);

        const data = await res.json();
        console.log('[Dashboard] Respuesta completa:', data);

        (data.saldos_por_nombramiento || []).forEach(nom => {
            console.log('[Dashboard] Saldo recibido:', nom.id_nombramiento, 
                        '→ disp:', nom.dias_disponibles, 
                        '/ acum:', nom.dias_acumulados);

            const pill = document.querySelector(`.nom-pill[data-id="${nom.id_nombramiento}"]`);
            console.log('[Dashboard] Pill encontrado para id', nom.id_nombramiento, ':', pill);

            if (pill) {
                pill.dataset.disp = nom.dias_disponibles;
                pill.dataset.acum = nom.dias_acumulados;
            }
        });

        const pillActivo = document.querySelector('.nom-pill.active');
        console.log('[Dashboard] Pill activo:', pillActivo, 
                    'data-id:', pillActivo?.dataset.id,
                    'data-disp:', pillActivo?.dataset.disp);

        if (pillActivo) updateBalance(pillActivo);

    } catch (err) {
        console.error('[Dashboard] Error cargando saldo:', err);
    }
}

    // ── Tooltip ───────────────────────────────────────────────────
    const tt = document.getElementById('tt');
    function showTT(e, name, type) {
        document.getElementById('ttName').textContent = name;
        document.getElementById('ttType').textContent = type;
        tt.classList.add('show');
        moveTT(e);
    }
    function moveTT(e) {
        tt.style.left = Math.min(e.clientX + 12, window.innerWidth - 180) + 'px';
        tt.style.top  = (e.clientY - 48) + 'px';
    }
    function hideTT() { tt.classList.remove('show'); }

    // ── Calendario ────────────────────────────────────────────────
    let curMonth = new Date().getMonth();

    function buildCal(mo) {
        curMonth = mo;
        document.getElementById('calMonthLabel').textContent = MONTHS[mo];

        const hdr = document.getElementById('weekHdr');
        hdr.innerHTML = '';
        WDAYS.forEach(d => {
            const el = document.createElement('div');
            el.className   = 'wday';
            el.textContent = d;
            hdr.appendChild(el);
        });

        const grid  = document.getElementById('calGrid');
        grid.innerHTML = '';
        const today = new Date();
        const first = new Date(2026, mo, 1).getDay();
        const total = new Date(2026, mo + 1, 0).getDate();

        for (let i = 0; i < first; i++) {
            const e = document.createElement('div');
            e.className = 'day empty';
            grid.appendChild(e);
        }

        for (let d = 1; d <= total; d++) {
            const cell = document.createElement('div');
            cell.className  = 'day';
            cell.textContent = d;
            const dow = new Date(2026, mo, d).getDay();
            const hol = HOLIDAYS.find(h => h.d === d && h.m === mo + 1);
            const isT = (today.getFullYear() === 2026 && today.getMonth() === mo && today.getDate() === d);

            if (isT) {
                cell.classList.add('today');
            } else if (hol) {
                cell.classList.add(hol.pay ? 'holiday' : 'nopay');
                const tipo = hol.pay ? 'Pago obligatorio' : 'No obligatorio';
                cell.addEventListener('mouseenter', e => showTT(e, hol.name, tipo));
                cell.addEventListener('mousemove', moveTT);
                cell.addEventListener('mouseleave', hideTT);
                const dot = document.createElement('div');
                dot.className = 'day-dot';
                cell.appendChild(dot);
            } else if (dow === 0 || dow === 6) {
                cell.classList.add('weekend');
            }
            grid.appendChild(cell);
        }
    }

    function prevMonth() { buildCal(curMonth > 0  ? curMonth - 1 : 0); }
    function nextMonth() { buildCal(curMonth < 11 ? curMonth + 1 : 11); }

    // ── Navbar ────────────────────────────────────────────────────
    function toggleGroup(id) {
        const grp    = document.getElementById('grp-' + id);
        const isOpen = grp.classList.contains('open');
        document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
        document.getElementById('userWrap').classList.remove('open');
        if (!isOpen) grp.classList.add('open');
    }

    function toggleUserMenu() {
        const wrap   = document.getElementById('userWrap');
        const isOpen = wrap.classList.contains('open');
        document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
        wrap.classList.toggle('open', !isOpen);
    }

    function toggleTheme() {
        const html = document.documentElement;
        const dark = html.getAttribute('data-theme') === 'dark';
        html.setAttribute('data-theme', dark ? 'light' : 'dark');
        document.getElementById('themeIcon').innerHTML = dark
            ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
            : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    }

    function logout() {
        if (confirm('¿Cerrar sesión?')) {
            localStorage.clear();
            window.location.href = 'autenticacion/login.html';
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // EJECUCIÓN — solo después de que todas las funciones están listas
    // ═══════════════════════════════════════════════════════════════

    // ── Fecha ─────────────────────────────────────────────────────
    const today = new Date();
    const fd    = today.toLocaleDateString('es-CR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
    const fdc   = fd.charAt(0).toUpperCase() + fd.slice(1);
    document.getElementById('navDate').textContent   = fdc;
    document.getElementById('greetDate').textContent = fdc;

    // ── Sesión ────────────────────────────────────────────────────
    const funcionario  = JSON.parse(localStorage.getItem('funcionario') || '{}');
    const nombre       = funcionario.nombre || 'Usuario';
    const ROL          = (funcionario.rol || '').toLowerCase();
    const ROLES_ADMIN  = ['rrhh', 'jefe', 'admin'];
    const esAdministrador = ROLES_ADMIN.includes(ROL);

    document.getElementById('greetName').textContent = nombre.split(' ')[0];

    // ── Card de saldo ─────────────────────────────────────────────
    const saldoCard = document.getElementById('saldoCard');

    if (esAdministrador) {
        const etiquetaRol = ROL === 'rrhh' ? 'RRHH' : ROL.charAt(0).toUpperCase() + ROL.slice(1);
        saldoCard.insertAdjacentHTML('beforeend', `
            <div class="no-nom-msg">
                <div class="no-nom-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <div class="no-nom-text">Este perfil no tiene<br>nombramientos asociados.</div>
                <span class="rol-badge">${etiquetaRol}</span>
            </div>
        `);

    } else {
        const nombramientosGuardados = JSON.parse(localStorage.getItem('nombramientos') || '[]');
        const nomActivo  = JSON.parse(localStorage.getItem('tipoNombramiento') || 'null');
        const idActivo   = nomActivo?.id_nombramiento ?? null;

        // Pills — con datos del localStorage como placeholder inicial
        // (se sobreescriben con datos reales al terminar cargarSaldosDesdeAPI)
        const pillsHtml = nombramientosGuardados.length > 0
            ? nombramientosGuardados.map((n, i) => {
                const idEste = n.id_nombramiento;
                const activo = idActivo ? idEste === idActivo : i === 0;
                const disp   = n.dias_vacaciones_disponibles ?? funcionario.dias_vacaciones_disponibles ?? 0;
                const acum   = n.dias_vacaciones_acumulados  ?? funcionario.dias_vacaciones_acumulados  ?? 0;
                return `
                    <div class="nom-pill ${activo ? 'active' : ''}"
                         data-id="${idEste}"
                         data-disp="${disp}"
                         data-acum="${acum}"
                         onclick="selectNom(this)">
                        <span class="nom-pill-name">${n.nombre_tipo || '—'}</span>
                        <span class="nom-pill-sub">${n.numero_nombramiento ? 'Nº ' + n.numero_nombramiento : ''}</span>
                    </div>`;
            }).join('')
            : `<div class="nom-pill active"
                    data-disp="${funcionario.dias_vacaciones_disponibles ?? 0}"
                    data-acum="${funcionario.dias_vacaciones_acumulados  ?? 0}"
                    onclick="selectNom(this)">
                   <span class="nom-pill-name">${JSON.parse(localStorage.getItem('tipoNombramiento') || '{}').nombre_tipo || 'Mi nombramiento'}</span>
               </div>`;

        saldoCard.insertAdjacentHTML('beforeend', `
            <div class="nom-pills" id="nomPills">${pillsHtml}</div>
            <div class="balance-main">
                <div class="balance-num" id="balNum">—</div>
                <div class="balance-unit">días disp.</div>
            </div>
            <div class="balance-bar">
                <div class="balance-fill" id="balFill" style="width:0%"></div>
            </div>
            <div class="balance-sub"  id="balSub">—</div>
            <div class="balance-acum" id="balAcum">—</div>
        `);

        // 1. Mostrar placeholder con datos del localStorage inmediatamente
        const primerPill = saldoCard.querySelector('.nom-pill.active') || saldoCard.querySelector('.nom-pill');
        if (primerPill) updateBalance(primerPill); // ✅ updateBalance ya está definida arriba

        // 2. Luego sobreescribir con datos reales del API
        cargarSaldosDesdeAPI(); // ✅ también ya está definida arriba
    }

    // ── Calendario ────────────────────────────────────────────────
    buildCal(today.getMonth());

    // ── Próximos feriados ─────────────────────────────────────────
    const upcoming = HOLIDAYS.filter(h => new Date(2026, h.m - 1, h.d) >= today).slice(0, 5);
    const hl = document.getElementById('holidayList');
    upcoming.forEach(h => {
        const item = document.createElement('div');
        item.className = 'h-item';
        item.innerHTML = `
            <div class="h-badge${h.pay ? '' : ' np'}">
                <div class="h-day">${h.d}</div>
                <div class="h-mon">${MONTHS[h.m - 1].slice(0, 3)}</div>
            </div>
            <div>
                <div class="h-name">${h.name}</div>
                <div class="h-type">${h.pay ? 'Pago obligatorio' : 'No obligatorio'}</div>
            </div>`;
        hl.appendChild(item);
    });

    // ── Eventos globales ──────────────────────────────────────────
    document.addEventListener('click', e => {
        if (!e.target.closest('.nav-group')) document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
        if (!e.target.closest('.user-wrap')) document.getElementById('userWrap').classList.remove('open');
    });

    document.addEventListener('nombramiento-changed', e => {
        const nom  = e.detail;
        const pill = document.querySelector(`.nom-pill[data-id="${nom.id_nombramiento}"]`);
        if (pill) selectNom(pill);
    });
</script>


</body>

</html>
